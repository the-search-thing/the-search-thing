default_install_hook_types:
  - post-commit

default_stages:
  - post-commit

fail_fast: false

repos:
  # Rust formatter
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all
        language: system
        files: \.rs$
        pass_filenames: false
        always_run: true

  # Client (Electron/React) linter
  - repo: local
    hooks:
      - id: client-oxlint
        name: oxlint (client)
        entry: bash -c "cd client && npx oxlint"
        language: system
        files: ^client/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false
        always_run: true

  # Client (Electron/React) formatter
  - repo: local
    hooks:
      - id: client-oxfmt
        name: oxfmt (client)
        entry: bash -c "cd client && npx oxfmt --write ."
        language: system
        files: ^client/.*\.(js|jsx|ts|tsx|json)$
        pass_filenames: false
        always_run: true

  # Website (Preact) linter
  - repo: local
    hooks:
      - id: website-oxlint
        name: oxlint (website)
        entry: bash -c "cd website && npx oxlint"
        language: system
        files: ^website/.*\.(js|jsx|ts|tsx)$
        pass_filenames: false
        always_run: true

  # Website (Preact) formatter
  - repo: local
    hooks:
      - id: website-oxfmt
        name: oxfmt (website)
        entry: bash -c "cd website && npx oxfmt --write ."
        language: system
        files: ^website/.*\.(js|jsx|ts|tsx|json)$
        pass_filenames: false
        always_run: true
